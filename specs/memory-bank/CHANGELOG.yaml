  - date: "2026-04-25"
    version: "1.3.2"
    commit: 8535e10
    status: pending
    title: "fix(observability): scrub Sentry breadcrumbs, centralize server env parsing, filter logger tags at source"
    details: |-
      Address the second round of Gemini review comments on PR #32.

      Privacy:

      - `src/lib/observability/sentry-scrubber.ts`: strip the `breadcrumbs`
        array on every Sentry event. Auto-captured breadcrumbs (console
        logs, fetch/XHR calls, UI clicks) routinely contain emails, auth
        tokens, or seeded query params, all of which issue #26 forbids
        forwarding. The scrubber now nulls the entire trail rather than
        attempting per-entry redaction. Added `breadcrumbs?: unknown` to
        `ScrubbableEvent` and a fifth regression test
        (`strips breadcrumbs to prevent PII leakage from auto-captured
        console/fetch/UI events`).
      - `instrument.server.mjs`: mirror the breadcrumb stripping inline so
        the self-hosted `--import` path behaves identically to the lazy
        `initServerSentryOnce` path.

      Maintainability:

      - `src/lib/observability/sentry-init.ts`: `initServerSentryOnce` now
        delegates env parsing to `getServerSentryConfig` from
        `sentry.env.ts`. The bespoke `parseTracesSampleRate` helper and
        the inline `SENTRY_ENVIRONMENT ?? "development"` default are gone;
        Zod parsing, defaults, and DSN-presence gating live in one place.
      - `src/lib/observability/logger.ts`: filter `captureException`
        context against `SAFE_TAG_KEYS` at the source instead of relying
        only on the downstream scrubber. Exported `SAFE_TAG_KEYS` from
        `sentry-scrubber.ts` so the allow-list stays single-sourced; the
        scrubber remains the authoritative compliance boundary.

      Validation:

      - `pnpm test --run`: 106 tests / 24 files passing (added 1).
      - `pnpm lint`, `pnpm format`, `pnpm typecheck`, `pre-commit`: all
        clean.

  - date: "2026-04-25"
    version: "1.3.1"
    commit: 888543f
    status: pending
    title: "fix(observability,billing): address PR #32 Gemini review comments"
    details: |-
      Address all four Gemini code-review comments on PR #32 so the Sentry
      Free-tier observability slice lands with a deterministic billing
      upsert and full default Sentry integrations.

      Billing correctness:

      - `src/routes/api/webhooks/creem.ts`: extend the
        `subscriptions` `onConflictDoUpdate` `set` clause to also write
        `productId` (via `resolveProductIdForPlanKey`) and `provider:
        "creem"`. Previously a plan change (e.g., monthly -> annual) would
        update `planKey` but leave `productId` stale on the existing row.
        The upsert now produces a fully deterministic post-state for all
        mutable fields and constant identifiers.

      Sentry default integrations:

      - `instrument.server.mjs`, `src/instrument.client.ts`, and
        `src/lib/observability/sentry-init.ts`: drop the `integrations: []`
        override from all three `Sentry.init` call sites. Setting an empty
        array disabled the SDK's default integrations (auto error capture,
        unhandled promise rejection, OpenTelemetry on server, breadcrumbs
        on client), which defeated the point of installing Sentry. The
        `beforeSend` scrubber is the real compliance boundary and remains
        in place, so enabling the defaults gives us comprehensive auto
        capture while keeping the issue #26 privacy posture intact.

      Rationale:

      - Gemini flagged the missing `productId`/`provider` as HIGH priority
        because a stale `productId` would break downstream billing
        reconciliation on plan changes.
      - The `integrations: []` pattern was a defensive carry-over from
        early experimentation; with the scrubber proven out via tests and
        `sendDefaultPii: false` still set, there is no remaining reason to
        disable defaults.

      No test or schema changes required: the upsert shape is still a
      superset of the insert shape, and the Sentry tests mock the SDK at
      the module level so integration defaults do not affect them.

  - date: "2026-04-24"
    version: "1.3.0"
    commit: bf89a98
    status: pending
    title: "feat(observability): ship Sentry Free-tier observability slice for hosted v2 errors"
    details: |-
      Implement the privacy-safe Sentry Free-tier integration planned in
      issue #26. Sentry stays disabled by default and only activates when
      the DSN env vars are set, so local development, CI, and preview
      deploys ship zero Sentry traffic until the maintainer opts in.

      Core wiring:

      - Installed `@sentry/tanstackstart-react@10.50.0` and ran
        `pnpm dedupe` to resolve a transient drizzle-orm peer duplication
        caused by Sentry's OpenTelemetry peer chain.
      - Added `src/lib/observability/sentry.env.ts` (Zod-parsed optional
        schema returning `null` when the DSN is missing),
        `src/lib/observability/sentry-scrubber.ts` (allow-list PII scrubber
        keeping only `route`, `operation`, `tier`, `fallbackTier`,
        `environment` tags and stripping `user`/`extra`/headers/query
        strings), and `src/lib/observability/sentry-init.ts`
        (`sentryBeforeSend` + idempotent `initServerSentryOnce` guarded by
        `Sentry.getClient()`).
      - Extended `src/lib/observability/logger.ts` so `captureException`
        forwards to `Sentry.captureException` via `Sentry.withScope` +
        `setTag` when a client is initialized, and keeps the existing
        `console.error` fallback for local dev. Tags derived from context
        use a `null → "null"` normalization so Sentry tag constraints are
        respected.
      - Added `src/instrument.client.ts` with double gating
        (`VITE_SENTRY_DSN` present AND `typeof window !== "undefined"`)
        side-effect imported from `src/router.tsx`, and
        `instrument.server.mjs` in the project root for self-hosted
        `--import ./instrument.server.mjs` bootstraps with inline
        beforeSend scrubbing matching the TS scrubber.

      Surface coverage:

      - Wired `src/components/progress/ProgressHydrator.tsx` and the Creem
        + Resend webhook handlers (`src/routes/api/webhooks/creem.ts`,
        `src/routes/api/webhooks/resend.ts`) through `captureException`.
        Webhooks now catch unexpected errors, return `500`, and forward
        the exception so provider retry behavior stays intact without
        hiding real failures.
      - Route loader entitlement fallbacks already flowed through
        `captureException` after issue `#21` (`resolvePracticeCapabilities`
        in `src/lib/practice/practice-runs.sync.ts`); no additional
        plumbing required there.

      Build and deploy:

      - Gated the Sentry Vite plugin (`sentryTanstackStart`) in
        `vite.config.ts` on `SENTRY_AUTH_TOKEN`, `SENTRY_ORG`, and
        `SENTRY_PROJECT` so source-map upload only runs when all three
        trusted credentials are present.
      - Verified `pnpm build` produces the Vercel function bundle with
        the Sentry core chunk (`_libs/sentry__core.mjs`, 366.66 kB) and
        no auth-token upload step when credentials are unset.

      Tests and docs:

      - Added `src/lib/observability/sentry-scrubber.test.ts` (4 tests)
        covering PII stripping, URL query/hash stripping on absolute and
        relative URLs, non-mutation of caller input, and the
        allow-list-based tag drop when nothing remains.
      - Added `src/lib/observability/sentry.env.test.ts` (5 tests)
        covering malformed DSN rejection, full env parsing, null return
        when the requested side's DSN is missing, and traces-rate
        resolution defaults.
      - Extended `src/lib/observability/logger.test.ts` to 5 tests
        (original 2 + Sentry no-client short-circuit + Sentry forwarding
        with safe tag context + null-tag normalization). Used
        `vi.hoisted` + `vi.mock` because `@sentry/tanstackstart-react`
        cannot be spied via `vi.spyOn` under ESM.
      - New suite: 105 tests across 24 files, all passing.
      - Documented `SENTRY_DSN`, `VITE_SENTRY_DSN`, `SENTRY_ENVIRONMENT`,
        `SENTRY_RELEASE`, `SENTRY_TRACES_SAMPLE_RATE`,
        `SENTRY_AUTH_TOKEN`, `SENTRY_ORG`, and `SENTRY_PROJECT` in
        `.env.example` and added a new `Observability` section to
        `README.md` with privacy posture, DSN activation steps, and a
        verify-a-test-event snippet.
    refs:
      - "I5D11"
      - "#5"
      - "#26"
  - date: "2026-04-24"
    version: "1.2.6"
    commit: TBD
    status: pending
    title: "docs(issue-21): close out paid-tier content gating bookkeeping"
    details: |-
      Closed issue #21 bookkeeping after confirming the paid-tier gating slice
      was already shipped to `main` by PR #25 between v1.1.18 and v1.1.20
      (commits 230a792, 40d0f63, and merge 3c4b101).

      Audited surfaces verified on main:
      - Capability matrix in `src/lib/entitlements/access-policy.ts`
        (`TIER_CAPABILITY_MATRIX`, `canUseLessonChallengeReroll`,
        `canUseScenarioReroll`, `canAccessScenarioRun`,
        `requiresPremiumScenarioDepth`, `fallbackFreeEntitlements`).
      - Server-side enforcement in `src/lib/practice/practice-runs.sync.ts`:
        `createLessonPracticeRun`, `createArenaCardsRun`, and
        `createArenaScenarioRun` throw
        `FORBIDDEN_CAPABILITY:randomization.premium.full` for sessions
        without the entitlement, and `getArenaPracticeRouteData` marks cards
        as `isLocked` via `canAccessScenarioRun(capabilities, ladderLevel)`.
      - Lesson upgrade UX in `src/routes/lesson/$slug.tsx` swaps the
        `New Challenge` button for a `Unlock New Challenge (Pro)` link to
        `/settings#paid-access` when `canUseChallengeReroll` is false.
      - Arena locked-content UX in `src/routes/arena/index.tsx` renders a
        `Lock` badge, `Advanced Scenario Depth (Pro)` copy, and
        `Unlock advanced scenario depth` CTAs for premium-depth cards.
      - Settings surface in `src/routes/settings.tsx` renders the full
        `TIER_CAPABILITY_MATRIX`, live tier/source/capabilities, and falls
        back to Free through `fallbackFreeEntitlements()` when the resolver
        throws.
      - Safe fallback in `resolvePracticeCapabilities` wraps
        `resolveEntitlementsForUserId` in try/catch and returns
        `fallbackFreeEntitlements().capabilities`, with exceptions routed
        through the shared observability logger.
      - Regression coverage in
        `src/lib/entitlements/access-policy.test.ts`,
        `src/lib/entitlements/entitlements.test.ts`, and
        `tests/browser/smoke.spec.ts`.

      Bookkeeping changes in this entry:
      - Moved `specs/current-changes/issue-21-paid-tier-content-gating-plan.md`
        to `specs/archived/completed/` with an appended closeout audit.
      - Removed the stale duplicate
        `specs/current-changes/issue-27-dev-tier-seeded-users-plan.md` that
        PR #30's archive commit (`6e2ae58`) left behind in both locations.
      - Dropped `I5D9` from issue #5 `remaining_deliverables` in
        `specs/memory-bank/active-context.yaml`; only `I5D10` and `I5D11`
        remain as umbrella deliverables.
      - Closed GitHub issue #21 with `state_reason=completed` and posted a
        closeout comment cross-linking PR #25 and the three implementing
        commits, since PR #25 used `Refs #21` rather than `Closes #21` and
        GitHub therefore never auto-closed the issue on merge.

      No runtime code changes.
    refs:
      - "I5D9"
      - "#5"
      - "#21"
      - "#25"
  - date: "2026-04-23"
    version: "1.2.5"
    commit: TBD
    status: pending
    title: "refactor(dev-seed): PR #30 Gemini follow-up — explicit periodDays, MS_PER_DAY constant, and cleanup"
    details: |-
      Addressed the eighth, ninth, and tenth Gemini review comments on PR #30
      for issue #27 (I5D12).

      - Added `periodDays` field to `SubscriptionSeedShape` interface in
        `seed-fixtures.ts`, with each fixture state defining its billing
        period (30 days for monthly, 365 days for annual/enterprise).
      - Added `MS_PER_DAY` constant for millisecond conversion instead of
        magic numbers, removing fragile string matching against plan keys.
      - Kept `process.env` for flag manipulation since `SeedGuardEnv` has a
        readonly index signature; the `env` parameter is only used for the
        guard check while the actual signal uses the global.
      - Removed redundant nullish coalescing operators in
        `tests/browser/fixtures/tiered-auth.ts` since `CredentialEntry`
        guarantees email and password are strings.
      - Replied to all three PR #30 review threads.
    refs:
      - "I5D12"
      - "#27"
      - "#30"
  - date: "2026-04-23"
    version: "1.2.4"
    commit: TBD
    status: pending
    title: "fix(dev-seed): PR #30 Gemini follow-up — calculate subscription duration by plan type"
    details: |-
      Addressed the seventh Gemini review comment on PR #30 for issue #27
      (I5D12).

      - Added duration calculation based on plan type in
        `upsertSubscriptionForFixture` in `src/lib/dev/seed-dev-users.ts`.
      - Annual plans (`planKey.includes("annual")`) now use 365 days, while
        monthly plans use 30 days.
      - This ensures the seeded data matches the expected billing shape for
        both `active_pro_monthly` and `active_pro_annual` fixtures.
      - Replied to the seventh PR #30 review thread.
    refs:
      - "I5D12"
      - "#27"
      - "#30"
