    title: "chore(security): resolve remaining automated dependency and CodeQL alerts"
    details: |-
      Followed up on the remaining automated security and quality alerts
      after Dependabot `#7` had already fixed `brace-expansion`.

      What changed:

      - Updated `resend` from `6.5.2` to `6.12.2`.
      - Added a targeted `resend>svix` override to `1.92.2`, removing
        the vulnerable transitive `uuid@10.0.0` path reported by
        Dependabot `#13`.
