        runtime stripping of `runSeed`
      - Matched the arena `currentActiveScenario` state type to the same
        `Omit<Scenario, "runSeed"> | null` so loader-derived active scenarios
        flow through without type drift
      - Replied to both Gemini review threads on PR #29
