entries:
  - date: "2026-04-22"
    version: "1.1.31"
    commit: 9f881dd
    status: completed
    title: "fix(types): align ArenaScenarioCard with runtime seed stripping"
    details: |-
      Addressed the final two PR #29 review comments on the issue #28
      seed-security branch.

      - Changed `ArenaScenarioCard extends Scenario` to
        `ArenaScenarioCard extends Omit<Scenario, "runSeed" | "seed">` so the
        type system matches the runtime behavior where `buildArenaScenarioCards`
        strips seed-like fields before returning client-facing cards
      - Verified `sql.identifier` is not compatible with drizzle-orm 0.45.1
        `onConflictDoUpdate` set clauses; kept `sql.raw('"seed"')` as the
        correct no-op upsert pattern for this Drizzle version
      - Replied to and resolved both Gemini review threads on PR #29
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.30"
    commit: e53119e
    status: completed
    title: "fix(security): harden seed cleanup edge cases"
    details: |-
      Addressed the eighth PR #29 review pass on the issue #28
      seed-security branch.

      - Removed the direct `window.location.origin` dependency from legacy
        seed-param cleanup while keeping Router-driven replacement
      - Made the insert-or-read no-op upsert use an explicit Postgres `"seed"`
        column reference
      - Cleared stale `?scenario=` search state when local Free arena shuffles
        reset the active scenario
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.29"
    commit: 1bba38f
    status: in-progress
    title: "chore(settings): share fallback compliance sections"
    details: |-
      Addressed the seventh PR #29 review pass on the issue #28
      seed-security branch.

      - Refactored the /settings SSR fallback and hydrated panel to share
        storage, privacy/support, paid-access, and account-rights sections
      - Preserved the server-visible fallback content that stabilizes smoke
        coverage while reducing duplicated compliance and tier copy
      - Rotated the memory-bank changelog after it exceeded the repo threshold
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.28"
    commit: 3b689bc
    status: in-progress
    title: "fix(security): make practice seed issuance atomic"
    details: |-
      Addressed the sixth PR #29 review pass on the issue #28
      seed-security branch.

      - Replaced read-then-write get-or-create seed issuance with an atomic
        insert-or-read upsert
      - Preserved the first generated owned seed on conflicts and returned the
        persisted seed to concurrent callers
      - Kept explicit reroll rotation as the only path that changes an owned
        practice seed
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.27"
    commit: eef145f
    status: in-progress
    title: "chore(security): address seed-cleanup navigation feedback"
    details: |-
      Addressed the fifth PR #29 review pass on the issue #28
      seed-security branch.

      - Updated the legacy seed-param cleanup hook to observe Router
        search-string changes
      - Preserved Router-based `replace` cleanup while ensuring internal
        navigations that introduce legacy seed params are stripped without a
        full route remount
      - Updated the issue #28 current-changes artifact and active context for
        the latest review pass
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.26"
    commit: 80c72c9
    status: in-progress
    title: "chore(security): address seed-utility review feedback"
    details: |-
      Addressed the fourth PR #29 review pass on the issue #28
      seed-security branch.

      - Defensively stripped seed-like fields from arena card payloads before
        returning client-facing cards
      - Moved practice seed and seed-row ID generation into shared pure helpers
        so server seed ownership and local Free shuffles reuse the same logic
      - Replaced direct legacy seed-param history mutation with Router
        navigation replacement
      - Updated the issue #28 current-changes artifact and active context for
        the latest review pass
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.25"
    commit: 58614c0
    status: in-progress
    title: "test(settings): stabilize checkpoint hydration fallback"
    details: |-
      Stabilized the PR #29 checkpoint path after the settings smoke test
      intermittently observed the ClientOnly loading fallback under concurrent
      browser-test load.

      - Replaced the `/settings` one-line ClientOnly fallback with a
        server-visible static summary for privacy, access, entitlement, support,
        deletion, and retention surfaces
      - Kept the interactive export/import/reset and account-aware entitlement
        behavior inside the hydrated settings panel
      - Updated the issue #28 current-changes artifact and active context for
        the checkpoint stability follow-up
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.24"
    commit: 89a96d6
    status: in-progress
    title: "chore(security): address seed-integrity review feedback"
    details: |-
      Addressed the third PR #29 review pass on the issue #28 seed-security
      branch.

      - Added cascade ownership from `practice_seeds.user_id` to `user.id` in
        the Drizzle schema, generated migration SQL, and migration snapshot
      - Changed local Free arena shuffles to use a fresh browser-local seed per
        click instead of reusing the fixed anonymous route seed
      - Updated the issue #28 current-changes artifact and active context for
        the latest review pass
    refs:
      - "I5D13"
  - date: "2026-04-22"
    version: "1.1.23"
    commit: 1bfb28e
    status: in-progress
    title: "chore(security): address seed-storage review feedback"
    details: |-
      Addressed the second PR #29 review pass on the issue #28
      seed-security branch.

      - Replaced delimiter-composed practice seed row IDs with random row IDs
        while keeping `(user_id, surface, scope)` as the ownership and upsert key
      - Preserved signed-in Free arena scenario shuffles as local,
        non-authoritative practice behavior without exposing URL seeds or
        granting Pro server-backed rerolls
      - Updated the issue #28 current-changes artifact and active context for
        the follow-up review pass
    refs:
      - "I5D13"
  - date: "2026-04-21"
    version: "1.1.22"
    commit: fe4ecaa
    status: in-progress
    title: "chore(security): address seed-security review feedback"
    details: |-
      Addressed PR #29 review feedback on the issue #28 seed-security branch
      and aligned README with the implemented seed boundary.

      - Added explicit reroll nonces so lesson drills and arena scenarios
        remount cleanly now that rerolls no longer change URL-visible seeds
      - Centralized legacy seed-param cleanup for lesson and arena routes
      - Switched practice seed update timestamps to database-native `now()`
      - Updated README to document server-owned signed-in seeds, stripped
        legacy seed params, crawlable public content, and anonymous/demo
        practice as non-certificate-bearing
    refs:
      - "I5D13"
  - date: "2026-04-21"
    version: "1.1.21"
    commit: c1ff17b
    status: in-progress
    title: "fix(security): remove URL-visible practice seeds"
    details: |-
      Started issue #28 with the first seed-security implementation slice for
      certificate-safe randomized practice.

      - Mapped lesson and arena seed exposure across route search params,
        loader data, and client reroll paths
      - Added the `practice_seeds` table so signed-in lesson, arena-card, and
        arena-scenario seeds are owned by `(user_id, surface, scope)`
      - Removed seed-bearing route search state from lesson and arena practice,
        including legacy URL cleanup for `seed`, `runSeed`, and `exclude`
      - Moved Pro lesson rerolls and arena rerolls to server functions that
        rotate owned seeds and return materialized practice data without the
        seed
      - Added regression coverage for stripped search params, seed-free
        client-facing payloads, and seed-free public practice markup
    refs:
      - "I5D13"
  - date: "2026-04-21"
    version: "1.1.20"
    commit: TBD
    status: in-progress
    title: "docs(planning): track issue #28 seed security"
    details: |-
      Added issue #28 to the local v2 planning and memory-bank state as a
      critical seed-security blocker for certificate-safe randomized practice.

      - Added a current-changes artifact for server-authoritative seed
        ownership and URL seed removal
      - Updated the issue #5 joint plan to include #28 in scope, risks,
        estimates, and deliverable mapping
      - Updated active-context so #28 is tracked under the #5 roadmap with
        critical priority and an explicit remaining deliverable
      - Prepared PR #25 for merge after resolving the observability review
        comment
    refs:
      - "I5D7, I5D13"
  - date: "2026-04-21"
    version: "1.1.19"
    commit: 40d0f63
    status: completed
    title: "chore(observability): address paid-tier review feedback"
    details: |-
      Addressed PR review feedback on the issue #21 paid-tier gating branch
      and split follow-up operational work into explicit v2 sub-issues.

      - Added a shared observability logger for exception capture with
        privacy-safe route and operation context
      - Replaced route-local entitlement fallback console logging in lesson
        and arena loaders with the shared logger
      - Added unit coverage for logger normalization and context handling
      - Created issue #26 for Sentry Free-tier hosted error observability
        under parent issue #5 and milestone v2
      - Created issue #27 for dev-only tiered seed users plus Playwright auth
        states under parent issue #5 and milestone v2
      - Updated issue #5 and issue #21 current-changes artifacts plus
        memory-bank roadmap state to include the new v2 sub-issues
    refs:
      - "I5D7, I5D11, I5D12, I21D4, I21D5"
