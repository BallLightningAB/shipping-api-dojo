entries:
  - date: "2026-04-14"
    version: "1.1.9"
    commit: TBD
    status: in-progress
    title: "docs(planning): define issue #10 premium and certificate contracts"
    details: |-
      Completed Wave 2 of issue #10 by documenting how the existing
      entitlement and certificate placeholders should evolve into premium,
      reporting, and shareable-credential surfaces later.

      - Defined the Free, Pro, and Enterprise packaging stance for premium
        randomization breadth, review modes, certificate access, and reporting
      - Added an analytics taxonomy and rollout guard that explicitly defers
        any non-essential tracking work until issue #12 permits it
      - Locked the certificate and badge surface matrix, credential data
        contract, LinkedIn-compatible manual-entry fields, and certificate
        email surfaces as future implementation guidance
      - Kept `README.md` unchanged because the public roadmap text did not
        require correction after the Wave 2 planning pass
      - Rotated the memory-bank changelog with `bash scripts/rotate-changelog.sh`
        once it crossed the repository maintenance threshold
      - Revalidated with `pre-commit`, `pnpm format`, `pnpm lint`, and
        `pnpm typecheck`
    refs:
      - "I10D3, I10D4"
  - date: "2026-04-14"
    version: "1.1.8"
    commit: 543791e
    status: in-progress
    title: "docs(planning): lock issue #10 wave 1 randomization and review-mode outline"
    details: |-
      Completed Wave 1 of issue #10 by turning the existing follow-on outline
      into a checkpointed execution plan and locking the product vocabulary for
      higher-value randomization and review-mode surfaces.

      - Reworked the local issue #10 plan into an execution-ready artifact with
        explicit progress tracking, non-goals, and wave ownership
      - Locked the higher-value randomization taxonomy across payload, header,
        error-signaling, evidence-snippet, misconception, and context-wrapper
        variation while keeping the issue outline-only
      - Defined the future review-mode surface names, access expectations, seed
        ownership, and replay boundaries for daily, weekly, weak-area, timed,
        and end-of-track runs
      - Updated `active-context.yaml` so issue #10 now records the completed
        Wave 1 checkpoint and clears the first two deliverables from the
        remaining list
      - Revalidated with `pre-commit`, `pnpm format`, `pnpm lint`, and
        `pnpm typecheck`
    refs:
      - "I10D1, I10D2"
  - date: "2026-04-13"
    version: "1.1.7"
    commit: a069d52
    status: completed
    title: "feat(content-runtime): finalize issue #9 canonical curriculum migration"
    details: |-
      Finalized issue #9 by shipping the completed 20/20/20 curriculum
      migration, hardening lesson rerolls on the cross-track lesson surface,
      and wrapping up the local execution artifacts for merge.

      - Completed the cross-track/public-runtime finish line with the final
        lesson hub, final scenario families, navigation updates, and the
        remaining legacy runtime fallback removals
      - Added exclusion-aware lesson rerolls plus extra SOAP WSDL drill
        variants so New Challenge avoids immediately repeating the current
        cross-track drill set when alternatives exist
      - Moved the lesson reroll button to a hydration-safe ClientOnly fallback
        so early clicks cannot silently no-op before the route hydrates
      - Extended the browser smoke checkpoint to wait for the hydrated reroll
        control and verify that the lesson prompts actually change on reroll
      - Updated the issue #9 plan and active-context artifacts, then archived
        the completed migration plan for handoff
      - Revalidated with `pre-commit`, `pnpm format`, `pnpm lint`,
        `pnpm typecheck`, `pnpm test:checkpoint`, and `pnpm build`
    refs:
      - "I9D1, I9D2, I9D3, I9D4, I9D5"
  - date: "2026-04-13"
    version: "1.1.5"
    commit: 1d417ea
    status: in-progress
    title: "docs(planning): track issue #9 checkpoint progress before wave 3"
    details: |-
      Updated the local issue #9 migration plan so the current branch state is
      visible at a glance before the next implementation wave starts.

      - Added an explicit execution-progress checklist covering Phase 0, Wave 1,
        Wave 2, and the browser-smoke checkpoint from issue #17
      - Added current shipped totals for lessons, canonical drill families, and
        canonical scenario families
      - Called out the current checkpoint runner and the next planned slice so
        the issue can resume cleanly when work continues with Wave 3
      - Revalidated with `pre-commit`, `pnpm format`, `pnpm lint`, and
        `pnpm typecheck`
    refs:
      - "I9D1, I9D2, I9D3, I9D4, I9D5"
  - date: "2026-04-13"
    version: "1.1.4"
    commit: 4046b2f
    status: completed
    title: "test(browser-smoke): add issue #17 cost-efficient checkpoint suite"
    details: |-
      Added a low-cost browser smoke layer that complements the existing
      Vitest coverage without turning route-level validation into a heavy
      end-to-end program.

      - Added Playwright Test with a single Chromium project and a dev-server
        `webServer` setup so the suite is easy to run locally
      - Added lightweight browser smoke coverage for the home page, learn hubs,
        a representative Wave 2 lesson, arena, wiki content, and directory
      - Added easy scripts for headless, headed, UI, and combined checkpoint
        test runs
      - Documented the suite in `README.md` and added a local plan artifact for
        issue #17 so the setup remains reusable for future mirrored products
      - Revalidated with `pre-commit`, `pnpm format`, `pnpm lint`,
        `pnpm typecheck`, `pnpm test:checkpoint`, and `pnpm build`
    refs:
      - "I17D1, I17D2, I17D3, I17D4, I17D5"
  - date: "2026-04-13"
    version: "1.1.3"
    commit: be9a8ce
    status: in-progress
    title: "feat(content-runtime): complete issue #9 wave 2 REST reliability expansion"
    details: |-
      Completed Wave 2 of issue #9 by expanding the REST curriculum, adding
      new operational incident coverage, and tightening the mixed-runtime
      transition behavior.

      - Added 6 new REST lessons covering idempotency patterns, timeout
        taxonomy, rate limits, partial success, webhook safety, and
        observability/runbooks
      - Expanded the authored content set to 14 lessons, 19 canonical drill
        families, and 10 canonical scenario families
      - Added targeted REST-supporting wiki and directory entries for token
        lifecycle, backpressure, webhook safety, compensation, health checks,
        dead-letter queues, and sandbox-versus-production drift
      - Added 5 new REST-heavy arena incidents and fixed arena-card
        deduplication so migrated canonical scenarios no longer surface under
        their legacy IDs
      - Revalidated with `pre-commit`, `pnpm format`, `pnpm lint`,
        `pnpm typecheck`, `pnpm test`, and `pnpm build`
    refs:
      - "I9D1, I9D2, I9D3"
  - date: "2026-04-13"
    version: "1.1.2"
    commit: 55972ca
    status: in-progress
    title: "feat(content-runtime): complete issue #9 wave 1 canonical migration"
    details: |-
      Completed Wave 1 of issue #9 by moving the current curriculum onto
      canonical family and catalog modules without changing the issue #8 seeded
      runtime contract.

      - Moved the issue #8 family definitions into dedicated canonical modules
        under `src/content/families/*` and added supporting catalogs under
        `src/content/catalog/*`
      - Migrated all 8 current lessons onto canonical lesson definitions while
        preserving the seeded runtime behavior and canonical family progress keys
      - Regrouped the current drills into 16 canonical drill families and the
        current incident scenarios into 5 canonical scenario families
      - Added legacy-to-canonical local progress remapping for drill and
        scenario IDs plus automated coverage for schema parsing and snapshot
        merging
      - Switched lesson navigation surfaces to the runtime lesson catalog and
        revalidated with `pre-commit`, `pnpm format`, `pnpm lint`,
        `pnpm typecheck`, `pnpm test`, and `pnpm build`
    refs:
      - "I9D4"
  - date: "2026-04-12"
    version: "1.1.1"
    commit: c3d5de3
    status: in-progress
    title: "docs(planning): sync issue #9 execution scope and follow-on roadmap"
    details: |-
      Synced the local memory-bank and GitHub roadmap before starting the full
      issue #9 implementation so the migration work can resume safely after any
      pause or quota interruption.

      - Updated the local issue #9 migration plan to align explicitly with the
        completed issue #8 PoC architecture and wave-based execution model
      - Updated the issue #5 joint plan to reflect that issues #7, #11, and #8
        are complete and that issue #9 is the active execution issue
      - Added follow-on outline artifacts for issue #15 (deep wiki expansion)
        and issue #16 (EDI sibling-product strategy)
      - Updated active-context.yaml to mark issue #9 in progress and add the
        new follow-on issues to the roadmap
      - Synced GitHub issues #5, #9, #10, #12, #13, #15, and #16 to match the
        current execution state and scope boundaries
      - Carried forward the existing removal of the stale
        `specs/current-changes/issue-8-poc-plan.md` copy now that the issue #8
        handoff lives under `specs/archived/completed`
    refs:
      - "I5D7, I5D8"
  - date: "2026-04-08"
    version: "1.1"
    commit: 7799a29
    status: in-progress
    title: "feat(content-runtime): complete issue #8 seeded family-model proof of concept"
    details: |-
      Completed the Issue #8 proof of concept by introducing a mixed legacy/family
      runtime, deterministic seeded lesson/arena randomization, and canonical
      progress mapping for the exemplar migrated content slice.

      - Added deterministic randomization helpers and automated tests for seed derivation and stable shuffle behavior
      - Added family-model lesson, drill-family, and scenario-family definitions for the REST, SOAP, and timeout-incident exemplars
      - Added a mixed content runtime that renders migrated and unmigrated lessons through the same route API during the transition period
      - Updated lesson and arena routes to use loader/search-param seeds plus reroll actions without hydration-risk randomization in SSR-visible content
      - Kept migrated drill and scenario progress keyed to canonical family IDs and enabled signed-in server write-through after initial progress sync
      - Validated with typecheck, tests, lint, build, and live dev-server route checks for the migrated lesson and arena pages
    refs:
      - "I8D1, I8D2, I8D3, I8D4"
