  - date: "2026-04-27"
    version: "1.4.1.4"
    commit: 931a689
    status: committed
    title: "perf(wiki): hoist static carrier vendor count out of WikiIndexPage (PR #34 review)"
    details: |-
      Address the fourth Gemini review pass on PR `#34` (issue `#15`,
      commit `401a676`) without changing any user-visible content,
      slug, URL, or sitemap output.

      What changed:

      - Hoisted the `carrierVendorCount` derivation (a `Set` over
        `carrierSurfaces.map((surface) => surface.vendorSlug)`) out of
        `WikiIndexPage` and into a module-scope constant in
        `src/routes/wiki/index.tsx`. This matches the pattern already
        applied to `carrierVendorGroups` in
        `src/routes/wiki/carriers/index.tsx`, so both static-data
        transformations now run once at module load instead of on
        every render.

      Validation:

      - `pnpm format`: clean.
      - `pnpm lint`: 0 errors.
      - `pnpm typecheck`: clean.
      - `pnpm test --run`: 151/151 across 27 files.
      - `pre-commit`: clean.

      Out of scope: no content, slug, URL, sitemap output, or
      directory data change. PR `#34` review thread was replied to
      inline.
    refs:
      - "I5D10"
      - "#5"
      - "#15"

  - date: "2026-04-27"
    version: "1.4.1.3"
    commit: 401a676
    status: committed
    title: "refactor(seo): hoist static carrier groups and centralize breadcrumb JSON-LD helper (PR #34 review)"
    details: |-
      Address the third Gemini review pass on PR `#34` (issue `#15`,
      commit `9acfbfb`) without changing any user-visible content,
      slug, URL, or sitemap output.

      What changed:

      - Hoisted `groupSurfacesByVendor(carrierSurfaces)` out of
        `CarrierIndexPage` in `src/routes/wiki/carriers/index.tsx`
        and into a module-scope `carrierVendorGroups` constant so the
        static-data transformation runs once at module load instead
        of on every render.
      - Added a shared `breadcrumbScripts(crumbs)` helper in
        `src/lib/seo/structured-data.ts` that wraps
        `generateBreadcrumbListSchema` + `jsonLdScript` and returns the
        ready-to-spread `head.scripts` entry array (empty when the
        schema is null). Updated all four wiki routes that emit
        breadcrumb JSON-LD to spread the helper:
        `src/routes/wiki/index.tsx`,
        `src/routes/wiki/$slug.tsx`,
        `src/routes/wiki/carriers/index.tsx`, and
        `src/routes/wiki/carriers/$slug.tsx`. The conditional
        null-handling is now centralized in one place, so the four
        routes cannot drift on this contract.
      - Routed `findRelatedConceptTitles` in
        `src/routes/wiki/carriers/$slug.tsx` through the existing
        `getWikiBySlug` helper instead of an inline
        `wikiEntries.find((item) => item.slug === slug)`, mirroring
        how `findRelatedSurfaces` already uses
        `getCarrierSurfaceBySlug`. Dropped the now-unused
        `wikiEntries` import.

      Validation:

      - `pnpm format`: clean.
      - `pnpm lint`: 0 errors.
      - `pnpm typecheck`: clean.
      - `pnpm test --run`: 151/151 across 27 files.
      - `pre-commit`: clean.

      Out of scope: no content, slug, URL, sitemap output, or
      directory data change. PR `#34` review threads were replied to
      inline.
    refs:
      - "I5D10"
      - "#5"
      - "#15"

  - date: "2026-04-26"
    version: "1.4.1.2"
    commit: 9acfbfb
    status: committed
    title: "fix(content): correct legacy XML protocol labeling and harden carrier-surface helpers (PR #34 review)"
    details: |-
      Address the second Gemini review pass on PR `#34` (issue `#15`,
      commit `50641c5`) without changing any user-visible content, slug,
      URL, or sitemap output.

      What changed:

      - Renamed the misleading `xml-rpc` member of `ProtocolFamily` to
        `xml-http` and documented in `src/content/types.ts` that this
        family covers proprietary XML-over-HTTP interfaces (such as
        legacy USPS Web Tools and pre-2024 UPS XML services) and is
        intentionally distinct from `soap` (envelope-based,
        WSDL-described) and from the unrelated XML-RPC standard, which
        none of the supported carriers implement.
      - Updated the UPS Legacy XML/SOAP and USPS Web Tools carrier
        surfaces in `src/content/carriers.ts`, plus the USPS Web Tools
        directory entry in `src/content/directory.ts`, to use
        `protocol: "xml-http"`. The displayed label
        ("XML over HTTP") is unchanged via `PROTOCOL_LABEL` in
        `src/routes/wiki/carriers/$slug.tsx`.
      - Routed `findRelatedSurfaces` in
        `src/routes/wiki/carriers/$slug.tsx` through the existing
        `getCarrierSurfaceBySlug` helper instead of an inline
        `carrierSurfaces.find(...)`, so all surface lookups (related,
        sibling, replacement) flow through a single helper. Dropped the
        now-unused `carrierSurfaces` import.
      - Conditionally pushed the breadcrumb script in
        `head.scripts` only when `generateBreadcrumbListSchema` returned
        a non-null payload, mirroring the existing `faqSchema` pattern.
        Even though the current call passes a fully-populated crumb
        list, this prevents an empty `<script>` tag from being rendered
        if a future caller hands in an empty array.

      Validation:

      - `pnpm format`: clean.
      - `pnpm lint`: 0 errors.
      - `pnpm typecheck`: clean.
      - `pnpm test --run`: 151/151 across 27 files.

      Out of scope: no content, slug, URL, sitemap output, or
      directory data change beyond the renamed protocol token. PR `#34`
      review threads were replied to inline.
    refs:
      - "I5D10"
      - "#5"
      - "#15"

  - date: "2026-04-26"
    version: "1.4.1.1"
    commit: 50641c5
    status: committed
    title: "fix(seo): address PR #34 review feedback on issue #15 wiki expansion"
    details: |-
      Address the four medium-priority Gemini review comments on PR `#34`
      (issue `#15`) without changing any user-visible content, slug, or URL.

      What changed:

      - Centralized canonical site identity in a single source of truth at
        `src/lib/seo/site.ts` exporting `SITE_URL`, `SITE_NAME`,
        `ORGANIZATION_NAME`, `ORGANIZATION_URL`, and a shared
        `toAbsoluteUrl(pathOrUrl)` helper. Both `src/lib/seo/sitemap.ts`
        and `src/lib/seo/structured-data.ts` now import from this module
        instead of redeclaring the origin, so the SEO surfaces cannot
        drift.
      - Hardened sitemap absolute-URL resolution against paths missing a
        leading slash by routing every entry through the shared
        `toAbsoluteUrl` helper, dropping the bespoke `toAbsolute`
        wrapper in `src/lib/seo/sitemap.ts`.
      - Made `generateBreadcrumbListSchema` SSR-safe: empty input now
        returns `null` (matching `generateFAQPageSchema`) instead of
        throwing and crashing the page during rendering. `jsonLdScript`
        was widened to accept `object | null` and returns `""` on null
        so existing eager-array call sites still type-check without
        per-call guards. Updated `src/lib/seo/structured-data.test.ts`
        to assert the null-return behavior.
      - Replaced the inline `carrierSurfaces.find(...)` replacement-surface
        lookup in `src/routes/wiki/carriers/$slug.tsx` with the existing
        `getCarrierSurfaceBySlug` helper so all surface lookups go
        through one consistent path.

      Validation:

      - `pnpm format`: clean.
      - `pnpm lint`: 0 errors.
      - `pnpm typecheck`: clean.
      - `pnpm test --run`: 151/151 tests across 27 files (unchanged
        coverage; the structured-data test now asserts null instead of
        throw).

      Out of scope: no content, slug, URL, sitemap output, or directory
      change. PR `#34` review threads were replied to inline.
    refs:
      - "I5D10"
      - "#5"
      - "#15"

