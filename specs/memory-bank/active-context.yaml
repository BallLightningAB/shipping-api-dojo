meta:
  release: "1.0.2"
  repo: "github.com/BallLightningAB/api-trainer"
  github-project: "https://github.com/users/BallLightningAB/projects/10"
  pdd_version: "1.0"
  references:
    changelog: specs/memory-bank/CHANGELOG.yaml
  # Legend:
  # - I{issue}D{n}: deliverable n for GitHub issue #{issue} (e.g. I3D3 = Issue #3 Deliverable 3)
  # - I3Docs / I3UI / I3Fix / I3Test / I3Biome: tags for documentation, UI polish, minor fixes, tests and Biome/tooling work not tied to a single deliverable
roadmap:
  current:
    - id: content-expansion
      issue: "#5"
      title: "Content expansion: minimum viable randomization, 20 lessons, 20 drill families, and deeper scenarios"
      status: planned
      priority: high
      links:
        issue: "https://github.com/BallLightningAB/api-trainer/issues/5"
      deliverables:
        - "[I5D1] Implement minimum viable randomization for MCQ answer order so the correct answer is not fixed in one slot"
        - "[I5D2] Implement minimum viable randomization for lesson drill order"
        - "[I5D3] Implement minimum viable randomization for arena scenario order"
        - "[I5D4] Reach a target of 20 lessons through the new content-family direction"
        - "[I5D5] Reach a target of 20 authored drill families with stronger explanations and stronger distractors"
        - "[I5D6] Deepen the scenario set into a clearer ladder and future scenario-family structure"
        - "[I5D7] Track the work through linked sub-issues for technical scoping, proof of concept, and full migration/content expansion"
        - "[I5D8] Keep higher-value randomization as a separate follow-on issue"
      est:
        dev_h: 16
        test_h: 4
      sub_issues:
        - id: content-expansion-scoping
          issue: "#7"
          title: "Technical scoping for content families, seeded randomization, and gated progress"
          status: planned
          links:
            issue: "https://github.com/BallLightningAB/api-trainer/issues/7"
        - id: content-expansion-poc
          issue: "#8"
          title: "Proof of concept for content families, seeded randomization, and deeper scenarios"
          status: planned
          links:
            issue: "https://github.com/BallLightningAB/api-trainer/issues/8"
        - id: content-expansion-migration
          issue: "#9"
          title: "Full content migration and expansion to 20 lessons, 20 drill families, and deeper scenarios"
          status: planned
          links:
            issue: "https://github.com/BallLightningAB/api-trainer/issues/9"
      remaining_deliverables:
        - "[I5D1] Implement minimum viable randomization for MCQ answer order so the correct answer is not fixed in one slot"
        - "[I5D2] Implement minimum viable randomization for lesson drill order"
        - "[I5D3] Implement minimum viable randomization for arena scenario order"
        - "[I5D4] Reach a target of 20 lessons through the new content-family direction"
        - "[I5D5] Reach a target of 20 authored drill families with stronger explanations and stronger distractors"
        - "[I5D6] Deepen the scenario set into a clearer ladder and future scenario-family structure"
        - "[I5D7] Track the work through linked sub-issues for technical scoping, proof of concept, and full migration/content expansion"
        - "[I5D8] Keep higher-value randomization as a separate follow-on issue"
      progress_log:
        - note: "Research captured in specs/current-changes/issue-5-content-expansion-research.md and GitHub issue #5 was updated to target minimum viable randomization, 20 lessons, 20 drill families, and deeper scenarios."
  next_steps:
    - id: create-og-images
      issue: "#6"
      title: "Create new OG images for API-Trainer site"
      status: planned
      priority: high
      links:
        issue: "https://github.com/BallLightningAB/api-trainer/issues/6"
      deliverables:
        - "[I6D1] Design new OG image templates for API-Trainer branding"
        - "[I6D2] Create OG images for main landing page"
        - "[I6D3] Create OG images for key learning pages (REST track, SOAP track, arena)"
        - "[I6D4] Update meta tags with new OG image URLs"
        - "[I6D5] Test OG image previews across social platforms"
      est:
        dev_h: 2
        test_h: 1
      sub_issues: []
      remaining_deliverables:
        - "[I6D1] Design new OG image templates for API-Trainer branding"
        - "[I6D2] Create OG images for main landing page"
        - "[I6D3] Create OG images for key learning pages (REST track, SOAP track, arena)"
        - "[I6D4] Update meta tags with new OG image URLs"
        - "[I6D5] Test OG image previews across social platforms"
      progress_log: []
    - id: higher-value-randomization
      issue: "#10"
      title: "Higher-value randomization, review modes, and premium challenge direction"
      status: planned
      priority: medium
      links:
        issue: "https://github.com/BallLightningAB/api-trainer/issues/10"
      deliverables:
        - "[I10D1] Outline higher-value randomized variants beyond ordering changes: payloads, headers, error codes, evidence snippets, and misconception rotation"
        - "[I10D2] Outline review-mode and challenge-mode surfaces such as daily or weekly seeded challenges"
        - "[I10D3] Outline premium-ready randomization features, analytics hooks, and content-gating opportunities"
        - "[I10D4] Reserve future AI-only challenge directions as explicit later work, not part of the current implementation"
      est:
        dev_h: 0
        test_h: 0
      sub_issues: []
      remaining_deliverables:
        - "[I10D1] Outline higher-value randomized variants beyond ordering changes: payloads, headers, error codes, evidence snippets, and misconception rotation"
        - "[I10D2] Outline review-mode and challenge-mode surfaces such as daily or weekly seeded challenges"
        - "[I10D3] Outline premium-ready randomization features, analytics hooks, and content-gating opportunities"
        - "[I10D4] Reserve future AI-only challenge directions as explicit later work, not part of the current implementation"
      progress_log: []
    - id: search-and-filtering
      title: "Wiki search, directory filtering"
      status: planned
      deliverables:
        - "[I6D1] Add wiki search"
        - "[I6D2] Add directory filtering"
  recent_done:
    - id: api-trainer-mvp
      issue: "#4"
      title: "Carrier API-Trainer MVP Build"
      status: done
      links:
        issue: "https://github.com/BallLightningAB/api-trainer/issues/4"
        pr: ""
      deliverables:
        - "[I4D1] Repo cleanse — remove BL boilerplate, rebrand to API Trainer"
        - "[I4D2] Progress system — Zod schema, localStorage storage, TanStack store, XP/streak actions"
        - "[I4D3] Content data layer — 8 lessons, 20+ drills, 5 scenarios, 13 wiki entries, 15 directory links"
        - "[I4D4] Routes + UI — landing, REST track, SOAP track, lesson/$slug, arena, wiki, wiki/$slug, directory, settings"
        - "[I4D5] Header/Footer rebrand with new navigation"
        - "[I4D6] SEO — meta tags, JSON-LD (WebSite + WebApplication), sitemap, robots.txt, manifest"
        - "[I4D7] README rewrite"
        - "[I4D8] Production build passes (pnpm build exit 0)"
        - "[I4D9] Fixed TanStack Store crash — replaced custom useProgressStore with proper useStore hook"
        - "[I4D10] Updated all component imports to use useStore(progressStore, selector) pattern"
        - "[I4D11] Created comprehensive api-trainer-pdd.yaml replacing balllightning-pdd.yaml"
        - "[I4D12] Updated color scheme — removed red (#DD3A28) in favor of blue/green/yellow from logo"
        - "[I4D13] Updated theme-color meta tags, CSS variables, and chart colors"
        - "[I4D14] Fixed TanStack Router export — changed getRouter() function to direct router export"
        - "[I4D15] Hardened progress hydration/cross-tab sync: validate+merge state, avoid full replacement, clean up listeners"
        - "[I4D16] Swapped progress store to @tanstack/store atom API to align with latest router/store runtime"
      est:
        dev_h: 6
        test_h: 2
      sub_issues: []
      remaining_deliverables: []
      progress_log: []
    - id: mvp-step-1-cleanup-plan
      issue: "#1"
      title: "MVP step 1: Boilerplate cleanup and build plan"
      status: done
