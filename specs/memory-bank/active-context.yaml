meta:
  release: "1.1.18"
  repo: "github.com/BallLightningAB/shipping-api-dojo"
  github-project: "https://github.com/users/BallLightningAB/projects/10"
  pdd_version: "1.0"
  references:
    changelog: specs/memory-bank/CHANGELOG.yaml
  # Legend:
  # - I{issue}D{n}: deliverable n for GitHub issue #{issue} (e.g. I3D3 = Issue #3 Deliverable 3)
  # - I3Docs / I3UI / I3Fix / I3Test / I3Biome: tags for documentation, UI polish, minor fixes, tests and Biome/tooling work not tied to a single deliverable
roadmap:
  current:
    - id: content-expansion
      issue: "#5"
      title: "Web v2 program: content expansion, hosted access, and knowledge surfaces"
      status: in-progress
      priority: high
      links:
        issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/5"
      deliverables:
        - "[I5D1] Implement minimum viable randomization for MCQ answer order so the correct answer is not fixed in one slot"
        - "[I5D2] Implement minimum viable randomization for lesson drill order"
        - "[I5D3] Implement minimum viable randomization for arena scenario order"
        - "[I5D4] Reach a target of 20 lessons through the new content-family direction"
        - "[I5D5] Reach a target of 20 authored drill families with stronger explanations and stronger distractors"
        - "[I5D6] Reach a target of 20 scenario families through the deeper scenario-family direction"
        - "[I5D7] Track the work through linked sub-issues for technical scoping, auth foundation, proof of concept, migration, deep wiki expansion, and paid access implementation"
        - "[I5D8] Keep higher-value randomization, certificates, and premium challenge direction as separate follow-on work"
        - "[I5D9] Implement entitlement-aware paid tiers, content gating, premium access surfaces, and launch-ready upgrade behavior"
        - "[I5D10] Expand the wiki and directory beyond curriculum support into the v2 carrier reference surface"
      est:
        dev_h: 140
        test_h: 72
      sub_issues:
        - id: content-expansion-scoping
          issue: "#7"
          title: "Technical scoping for content families, seeded randomization, and gated progress"
          status: done
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/7"
        - id: content-expansion-auth-foundation
          issue: "#11"
          title: "Auth, entitlements, billing, email, and domain foundation"
          status: done
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/11"
          progress_log:
            - covers: [I11D2] note: "Neon database connection configured with pooled connection string in .env.local"
            - covers: [I11D3] note: "Better Auth environment variables configured with strong secret and local dev URLs"
            - covers: [I11D5] note: "Creem store created, API key configured with minimal permissions, webhooks set up for all events"
            - covers: [I11D6] note: "Resend domain mail.apidojo.app verified, Cloudflare email routing configured and aligned with outbound domain"
            - covers: [I11D2, I11D3, I11D5, I11D6] note: "External services foundation completed - implementation work remaining"
            - note: "Foundation setup complete, ready to begin Better Auth, Creem integration, and email implementation"
            - covers: [I11D2] note: "Completed Phase 1 Neon/Drizzle implementation: added schema, migration generation workflow, DB env parsing, DB client scaffolding, and unit tests for env+schema modules."
            - covers: [I11D3] note: "Completed Phase 2 Better Auth server scaffolding: added Better Auth server instance, TanStack Start /api/auth/$ handler, auth env parsing tests, and core auth schema/migration tables."
            - covers: [I11D4] note: "Started Phase 3 server-backed progress contracts: added signed-in read/write server functions, anonymous merge decision flow, tested merge utility behavior, and wired signed-in sync through ProgressHydrator with safe no-write behavior when user merge choice is still pending."
            - covers: [I11D3] note: "Started Phase 4 capability-based entitlements: added tier/capability resolution helpers, server-side entitlement/capability guards, and a development entitlement debug panel in settings."
            - covers: [I11D5] note: "Started Phase 5 Creem webhook sync: added signature/payload helpers, webhook endpoint, and idempotent subscription + entitlement upsert flow with unit tests."
            - covers: [I11D6] note: "Completed Phase 6 Resend lifecycle-email foundation: added React Email template rendering, tracked webhook event ingestion with Svix verification + idempotency, and billing lifecycle email dispatch helpers."
            - covers: [I11D1, I11D7] note: "Started Phase 7 domain/auth cutover readiness in code: added preview-safe Better Auth host allow-list config, cookie-domain support, trusted proxy handling, and secure-cookie policy wiring."
            - covers: [I11D1, I11D2, I11D3, I11D4, I11D5, I11D6, I11D7] note: "Issue #11 completed end-to-end: preview verified, production envs uploaded, local envs aligned to preview, completed phase artifacts archived, and the branch is ready to merge to main."
            - covers: [I11D3, I11D5] note: "Captured the remaining architectural caveat in README and on GitHub: user_entitlements currently co-mingles manual/admin and Creem-derived state, so any future manual grants should make the read path source-aware or split the model."
            - covers: [I11D6] note: "Tightened billing lifecycle email classification so routine active subscription.updated events do not resend subscription confirmation emails; confirmations now require explicit activation signals or inactive-to-active transitions."
        - id: content-expansion-poc
          issue: "#8"
          title: "Proof of concept for content families, seeded randomization, and deeper scenarios"
          status: done
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/8"
        - id: content-expansion-migration
          issue: "#9"
          title: "Full content migration and expansion to 20 lessons, 20 drill families, and 20 scenario families"
          status: done
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/9"
          progress_log:
            - note: "Completed issue #9 Wave 3: added 4 new SOAP lessons, reached 20 canonical drill families and 15 canonical scenario families, expanded the SOAP-supporting wiki and directory entries, and validated the checkpoint with pnpm format, pnpm typecheck, pnpm test, pnpm test:checkpoint, pnpm lint, and pnpm build."
            - note: "Completed issue #9 Wave 4: added the 2 cross-track lessons and `/learn/cross-track` hub, expanded the arena to the full 20 canonical scenario families, removed the remaining legacy lesson/arena runtime fallbacks, updated navigation plus smoke coverage for the final 20/20/20 curriculum, hardened Playwright to use a dedicated non-reused dev-server port, and validated with pnpm typecheck, pnpm test, pnpm lint, pnpm test:checkpoint, and pnpm build."
            - note: "Completed the issue #9 wrap-up pass: hardened lesson rerolls so New Challenge resets state locally, avoids the current drill IDs when alternatives exist, added extra SOAP WSDL drill variants plus reroll runtime coverage, made the reroll control hydration-safe with a ClientOnly fallback, and revalidated with pnpm typecheck, pnpm test, pnpm lint, pnpm test:checkpoint, and pnpm build before archiving the local migration plan."
        - id: challenge-depth-reroll-audit
          issue: "#19"
          title: "Audit and fix low challenge-depth lesson rerolls"
          status: done
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/19"
        - id: remaining-drill-family-depth
          issue: "#20"
          title: "Expand remaining two-variant drill families"
          status: done
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/20"
        - id: deep-wiki-expansion
          issue: "#15"
          title: "Deep wiki expansion by vendor, business unit, region, and protocol surface"
          status: planned
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/15"
        - id: paid-tier-content-gating
          issue: "#21"
          title: "Implement paid tiers, entitlement gating, and premium access surfaces"
          status: in-progress
          links:
            issue: "https://github.com/BallLightningAB/shipping-api-dojo/issues/21"
      remaining_deliverables:
        - "[I5D9] Implement entitlement-aware paid tiers, content gating, premium access surfaces, and launch-ready upgrade behavior"
        - "[I5D10] Expand the wiki and directory beyond curriculum support into the v2 carrier reference surface"
      progress_log:
        - note: "Research captured in specs/current-changes/issue-5-content-expansion-research.md and GitHub issue #5 was updated to target minimum viable randomization, 20 lessons, 20 drill families, and 20 scenario families."
        - note: "Created the issue-5 joint plan plus issue-specific plan artifacts for #7, #11, #8, #9, and #10; added GitHub issue #11 for auth/billing/email/domain foundation; and updated the roadmap to sequence work as #7 -> #11 -> #8 -> #9 with #10 as follow-on."
        - note: "I5D7 is satisfied by the current sub-issue set and plan artifacts, and I5D8 remains intentionally tracked in issue #10 as separate follow-on work."
        - note: "Synced GitHub issues #5, #7, #8, #9, #10, and #11 with the refined local plan set after external review, including explicit validation expectations and the updated implementation details."
        - note: "Added GitHub issue #13 and a local outline plan for mobile readiness so the current web-first v2 work preserves platform-neutral content, progress, entitlement, and certificate boundaries for a future native client."
        - note: "Updated the v2 joint/scoping/foundation/migration plans with SEO-first guardrails, heavier automated-testing expectations, revised estimates, and a new local compliance plan for issue #12; refreshed README.md, TRADEMARKS.md, package metadata, and the AGPL/open-core direction; added a standalone Vitest config plus foundational unit tests for progress parsing and SEO metadata so pnpm test is now a real passing check; replaced LICENSE with the full canonical GNU AGPL v3 text; and shifted the planned production domain strategy from shippingapidojo.com to shipping.apidojo.app under the apidojo.app umbrella, including aligned SEO files and regenerated OG assets."
        - note: "Unified the public site around the Shipping API Dojo product name, expanded crawlable SEO coverage to lesson and wiki routes, removed settings from index targets, migrated the local progress storage key away from the old api-trainer name, and added a local .gitignored account/env rollout checklist ahead of the planned repo rename."
        - note: "Validated issue #7 scoping against the current codebase plus current TanStack Start, Better Auth, Resend, Neon, and Drizzle docs; clarified that SSR-visible seeds may come from loaders but secret or auth-bound logic must move to server functions/server routes; captured Resend Free's single-domain and single-webhook constraints; corrected the registrar checklist to apidojo.app; and marked the issue-7 plan as implementation-ready for #11 without implying that the v2 architecture already exists in code."
        - note: "Closed GitHub issue #7, archived the issue-7 scoping plan, and marked the #7 sub-issue in the roadmap as done so the remaining v2 sequence can proceed to #11."
        - note: "Completed issue #8: introduced a mixed legacy/family content runtime, migrated the REST and SOAP exemplar lessons plus the timeout scenario family, added deterministic seeded randomization for lesson drills/MCQ options/arena cards, kept progress keyed to canonical family IDs, and validated with typecheck, tests, lint, build, and live dev-server route checks."
        - note: "Started issue #9 Phase 0 documentation sync: updated the issue-9 local plan and issue-5 joint plan, moved issue #9 to in-progress, and created follow-on issues #15 (deep wiki expansion) and #16 (EDI product and subdomain strategy) so the active migration scope stays focused and resumable."
        - note: "Completed issue #9 Wave 1: moved the issue-8 family definitions into canonical family and catalog modules, migrated all 8 current lessons onto canonical lesson definitions, regrouped the current lesson drills into 16 canonical drill families and the current incidents into 5 canonical scenario families, added legacy-to-canonical local progress remapping for drill/scenario IDs, switched lesson navigation surfaces to the runtime catalog, and validated with pnpm typecheck, pnpm test, pnpm lint, and pnpm build."
        - note: "Completed issue #9 Wave 2 locally on codex/issue-9-migration after pushing the Wave 1 checkpoint: added the 6 new REST lessons, expanded the migration to 19 canonical drill families and 10 canonical scenario families, added the targeted REST-supporting wiki and directory entries, fixed arena-card deduplication for legacy scenario IDs, and validated with pnpm format, pnpm typecheck, pnpm test, pnpm lint, and pnpm build."
        - note: "Completed issue #9 Wave 3 on codex/issue-9-migration: added the 4 new SOAP lessons, finished the 20-family drill taxonomy, expanded the arena to 15 canonical scenario families with 5 new SOAP-heavy incidents, extended the SOAP support wiki/directory surfaces, and validated with pnpm format, pnpm typecheck, pnpm test, pnpm test:checkpoint, pnpm lint, and pnpm build."
        - note: "Completed issue #9 Wave 4 on codex/issue-9-migration: shipped the 2 cross-track lessons and hub, reached the final 20 canonical scenario families, removed the remaining legacy lesson/arena runtime fallback paths, updated navigation plus checkpoint coverage for the completed curriculum, and fixed Playwright's local server isolation so pnpm test:checkpoint now consistently boots this repo on its own port."
        - note: "Completed issue #9 end-to-end: fixed lesson rerolls so New Challenge resets and avoids immediate repeats, archived the local migration plan after the final validation pass, and satisfied the remaining issue #5 20/20/20 curriculum deliverables."
        - note: "Completed issue #19: audited every lesson across 400 seeded runs, expanded the shallow reusable drill families that made rerolls feel repetitive, added a runtime challenge-depth floor test, and recorded the post-fix depth matrix plus the remaining two-variant family watch list in specs/current-changes/challenge-depth-audit-2026-04-15.md."
        - note: "Created issue #20 as the follow-up for expanding the remaining two-variant drill families without changing family IDs, lesson slugs, progress keys, or route contracts."
        - note: "Completed issue #20: expanded the six remaining two-variant drill families to four authored variants each, added runtime regression coverage for the watch-list family pool size and missing-drill references, updated the audit matrix so the former 12-outcome lessons now report 24 outcomes across 400 seeds, and archived the completed challenge-depth artifacts."
        - note: "Corrected issue #5 back to an open v2 umbrella: #10 remains outline-only, #12 remains compliance-only, #15 is now an in-scope v2 sub-issue, #21 tracks the missing paid-tier/content-gating implementation, and #13/#16 remain separate strategy follow-ons outside #5 closure criteria."
        - note: "Started issue #21 on codex/issue-21-paid-tier-gating: shipped the first paid-tier slice with a concrete Free/Pro/Enterprise matrix, entitlement-aware gating for premium lesson rerolls plus advanced arena depth, locked/upgrade UX that keeps public educational pages crawlable, safe free fallback behavior for missing/inactive/canceled paid states, and regression coverage for the new access-policy logic."
