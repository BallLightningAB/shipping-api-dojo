            - covers: [I11D2, I11D3, I11D5, I11D6] note: "External services foundation completed - implementation work remaining"
            - note: "Foundation setup complete, ready to begin Better Auth, Creem integration, and email implementation"
            - covers: [I11D2] note: "Completed Phase 1 Neon/Drizzle implementation: added schema, migration generation workflow, DB env parsing, DB client scaffolding, and unit tests for env+schema modules."
            - covers: [I11D3] note: "Completed Phase 2 Better Auth server scaffolding: added Better Auth server instance, TanStack Start /api/auth/$ handler, auth env parsing tests, and core auth schema/migration tables."
            - covers: [I11D4] note: "Started Phase 3 server-backed progress contracts: added signed-in read/write server functions, anonymous merge decision flow, tested merge utility behavior, and wired signed-in sync through ProgressHydrator with safe no-write behavior when user merge choice is still pending."
            - covers: [I11D3] note: "Started Phase 4 capability-based entitlements: added tier/capability resolution helpers, server-side entitlement/capability guards, and a development entitlement debug panel in settings."
            - covers: [I11D5] note: "Started Phase 5 Creem webhook sync: added signature/payload helpers, webhook endpoint, and idempotent subscription + entitlement upsert flow with unit tests."
            - covers: [I11D6] note: "Completed Phase 6 Resend lifecycle-email foundation: added React Email template rendering, tracked webhook event ingestion with Svix verification + idempotency, and billing lifecycle email dispatch helpers."
            - covers: [I11D1, I11D7] note: "Started Phase 7 domain/auth cutover readiness in code: added preview-safe Better Auth host allow-list config, cookie-domain support, trusted proxy handling, and secure-cookie policy wiring."
            - covers: [I11D1, I11D2, I11D3, I11D4, I11D5, I11D6, I11D7] note: "Issue #11 completed end-to-end: preview verified, production envs uploaded, local envs aligned to preview, completed phase artifacts archived, and the branch is ready to merge to main."
            - covers: [I11D3, I11D5] note: "Captured the remaining architectural caveat in README and on GitHub: user_entitlements currently co-mingles manual/admin and Creem-derived state, so any future manual grants should make the read path source-aware or split the model."
            - covers: [I11D6] note: "Tightened billing lifecycle email classification so routine active subscription.updated events do not resend subscription confirmation emails; confirmations now require explicit activation signals or inactive-to-active transitions."
