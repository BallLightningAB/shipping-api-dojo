        - note: "Based on official EU/UK guidance reviewed on 2026-03-17, the current plan does not require a cookie-consent banner if storage is limited to strictly necessary auth/session and requested-service functionality, but still requires privacy and storage disclosures before launch."
        - note: "Added specs/current-changes/issue-12-compliance-plan.md to make the privacy/storage/compliance work part of the explicit local v2 planning set."
